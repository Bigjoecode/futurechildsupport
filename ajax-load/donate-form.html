          <!-- Script for Donation Form Custom Amount -->
          <script type="text/javascript">
            $(document).ready(function(e) {
              var $donation_form = $("#popup_paypal_donate_form_onetime_recurring");
              //toggle custom amount
              var $custom_other_amount = $donation_form.find("#custom_other_amount");
              $custom_other_amount.hide();
              $donation_form.find("[name='amount']").change(function() {
                  var $this = $(this);
                  if ($this.val() == 'other') {
                    $custom_other_amount.show().append('<div class="input-group"><span class="input-group-addon">$</span> <input id="input_other_amount" type="text" name="amount" class="form-control" value="100"/></div>');
                  }
                  else{
                    $custom_other_amount.children( ".input-group" ).remove();
                    $custom_other_amount.hide();
                  }
              });

              var $custom_other_amount1 = $donation_form.find("#custom_other_amount1");
              $custom_other_amount1.hide();
              $donation_form.find("[name='amount1']").change(function() {
                  var $this = $(this);
                  if ($this.val() == 'other') {
                    $custom_other_amount.show().append('<div class="input-group"><span class="input-group-addon">$</span> <input id="input_other_amount" type="text" name="amount1" class="form-control" value="100"/></div>');
                  }
                  else{
                    $custom_other_amount.children( ".input-group" ).remove();
                    $custom_other_amount.hide();
                  }
              });

              var $payment_type_btc = $donation_form.find("#payment_type_btc");
              var $payment_type_bank = $donation_form.find("#payment_type_bank");
              $payment_type_btc.hide();
              $payment_type_bank.hide();

              $("input[name='payment_type']").change(function() {
                  console.log("Payment type changed to: " + this.value);
                  if (this.value == 'btc_payment') {
                      $payment_type_btc.show();
                      $payment_type_bank.hide();
                  }
                  else if (this.value == 'bank_payment') {
                      $payment_type_bank.show();
                      $payment_type_btc.hide();
                  }
              });

              // submit form on click
          
              $donation_form.on('submit', function(e){
               

              });

            });
